<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OwnWatts HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aleo:wght@400;500;600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ow-teal:#0FA3B1;--ow-teal-dark:#0b7a85;--ow-teal-light:#e1f5f7;
  --ow-orange:#F35B04;--ow-orange-light:#fff0e8;--ow-orange-dark:#c24803;
  --ow-coral:#F7A072;--ow-butter:#EDDEA4;--ow-offwhite:#F0F4EC;
  --ow-charcoal:#2E2A39;--ow-gray:#B7B7B7;
  --bg:#F0F4EC;--surface:#fff;--surface2:#f8faf7;
  --text:#2E2A39;--text2:#5a5566;--text3:#9a96a3;
  --border:#B7B7B7;--border-light:#dde8db;
  --red:#c0392b;--red-light:#fdf0ef;
  --font-head:'Aleo',Georgia,serif;--font-body:'Poppins',sans-serif;
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem}
.app{max-width:1100px;margin:0 auto}

/* Loading / error states */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center}
.spinner{width:36px;height:36px;border:3px solid var(--border-light);border-top-color:var(--ow-teal);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-label{font-family:var(--font-head);font-size:15px;color:var(--text2)}
.error-box{background:var(--red-light);border:1px solid var(--red);border-radius:10px;padding:1rem 1.25rem;max-width:400px}
.error-box p{font-size:13px;color:var(--red);line-height:1.5}
.retry-btn{margin-top:10px;font-family:var(--font-body);font-size:12px;padding:6px 14px;border-radius:7px;border:none;background:var(--red);color:#fff;cursor:pointer}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;padding-bottom:0.85rem;border-bottom:1px solid var(--border-light)}
.logo{font-family:var(--font-head);font-size:17px;font-weight:600;color:var(--ow-teal);display:flex;align-items:center;gap:8px}
.logo-mark{width:22px;height:22px;border-radius:50%;background:var(--ow-teal);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:12px;height:12px;fill:#fff}
.db-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--ow-teal-light);color:var(--ow-teal-dark);font-family:var(--font-body)}
.controls{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)}
.view-tab{padding:5px 12px;font-family:var(--font-body);font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all 0.15s}
.view-tab.active{background:var(--ow-teal);color:#fff;font-weight:500}
.filter-select{font-family:var(--font-body);font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer}
.add-btn{font-family:var(--font-body);font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;border:none;background:var(--ow-orange);color:#fff;cursor:pointer}
.add-btn:hover{background:var(--ow-orange-dark)}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:0.65rem 0.85rem;border-top:3px solid var(--ow-teal)}
.stat-card.orange{border-top-color:var(--ow-orange)}.stat-card.coral{border-top-color:var(--ow-coral)}.stat-card.butter{border-top-color:#c8a800}
.stat-label{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.03em}
.stat-val{font-family:var(--font-head);font-size:20px;font-weight:600;color:var(--ow-charcoal)}
.stat-sub{font-size:10px;color:var(--text3)}

/* Board */
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:10px}
.project-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:0.85rem;display:flex;flex-direction:column;gap:8px}
.project-card.decide{border-top:3px solid var(--ow-orange)}.project-card.someday{border-top:3px solid var(--ow-gray);opacity:0.8}.project-card.active{border-top:3px solid var(--ow-teal)}
.project-header{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
.project-name{font-family:var(--font-head);font-size:12px;font-weight:600;color:var(--ow-charcoal);line-height:1.3}
.project-badge{font-size:9px;padding:2px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-active{background:var(--ow-teal-light);color:var(--ow-teal-dark)}.badge-decide{background:var(--ow-orange-light);color:var(--ow-orange-dark)}.badge-someday{background:var(--ow-offwhite);color:var(--text3)}
.progress-wrap{display:flex;align-items:center;gap:6px}
.progress-bar{flex:1;height:3px;background:var(--ow-offwhite);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--ow-teal);border-radius:2px;transition:width 0.4s}
.progress-pct{font-size:9px;color:var(--text3);white-space:nowrap}

/* Tasks */
.task-list{display:flex;flex-direction:column;gap:2px}
.task-item{display:flex;align-items:flex-start;gap:6px;padding:4px 5px;border-radius:5px;transition:background 0.1s;position:relative}
.task-item:hover{background:var(--ow-teal-light)}.task-item:hover .del-btn{opacity:1}
.task-check{width:14px;height:14px;border-radius:50%;border:2px solid #888;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;background:#fff}
.task-check:hover{border-color:var(--ow-teal)}
.task-check.checked{background:var(--ow-teal);border-color:var(--ow-teal)}
.task-check.checked::after{content:'';display:block;width:4px;height:2.5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.task-text{font-size:11px;color:var(--text);line-height:1.35;flex:1}
.task-context{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.ctx-deep{background:var(--ow-teal-light);color:var(--ow-teal-dark)}.ctx-quick{background:var(--ow-orange-light);color:var(--ow-orange-dark)}.ctx-research{background:#ede8ff;color:#5340a0}.ctx-waiting{background:var(--ow-offwhite);color:#5a6b4a}.ctx-decide{background:#fff8e0;color:#8a6a00}.ctx-weekly{background:var(--ow-butter);color:#6b5a00}
.del-btn{opacity:0;flex-shrink:0;width:16px;height:16px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.del-btn:hover{background:var(--red-light);border-color:var(--red)}
.del-btn svg{width:7px;height:7px;stroke:var(--text3);stroke-width:2;fill:none}.del-btn:hover svg{stroke:var(--red)}
.add-task-row{display:flex;gap:5px;margin-top:2px}
.add-task-input{flex:1;font-family:var(--font-body);font-size:11px;padding:4px 7px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.add-task-input:focus{outline:none;border-color:var(--ow-teal)}
.add-task-btn{font-size:13px;padding:3px 9px;border-radius:6px;border:none;background:var(--ow-teal);color:#fff;cursor:pointer}
.show-more{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;border:none;background:transparent;text-align:left}.show-more:hover{color:var(--ow-teal)}

/* Confirm overlay */
.confirm-overlay{position:absolute;inset:0;background:rgba(46,42,57,0.55);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:5px}
.confirm-box{background:var(--surface);border-radius:8px;border:1px solid var(--border-light);padding:12px 14px;width:220px;max-width:90%}
.confirm-msg{font-size:11px;color:var(--text);margin-bottom:10px;line-height:1.4}
.confirm-actions{display:flex;gap:7px;justify-content:flex-end}
.confirm-cancel{font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer}
.confirm-delete{font-size:10px;padding:4px 10px;border-radius:5px;border:none;background:var(--red);color:#fff;cursor:pointer;font-weight:500}.confirm-delete:hover{background:#a93226}

/* List view */
.list-view{display:flex;flex-direction:column;gap:7px}
.list-section{background:var(--surface);border:1px solid var(--border-light);border-radius:10px;overflow:hidden}
.list-section-header{padding:8px 0.85rem;display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--surface2)}
.list-section-title{font-family:var(--font-head);font-size:12px;font-weight:600;color:var(--ow-charcoal);flex:1}
.list-task{display:flex;align-items:center;gap:8px;padding:7px 0.85rem;border-top:1px solid var(--border-light);transition:background 0.1s;position:relative}
.list-task:hover{background:var(--ow-teal-light)}.list-task:hover .del-btn{opacity:1}
.list-task-text{font-size:12px;color:var(--text);flex:1;min-width:0}
.list-task-text[contenteditable]:focus{outline:1px solid var(--ow-teal);border-radius:3px;padding:0 2px}
.section-count{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--ow-offwhite);color:var(--text2)}
.collapse-arrow{font-size:9px;color:var(--text3);transition:transform 0.2s}
.collapsed .collapse-arrow{transform:rotate(-90deg)}.collapsed .list-task,.collapsed .add-task-row-list{display:none}
.add-task-row-list{padding:7px 0.85rem;border-top:1px solid var(--border-light);display:flex;gap:5px}
.ctx-select{font-size:10px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text2);padding:1px 3px;cursor:pointer}
.folder-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);padding:0.4rem 0 0.2rem;font-weight:500}

/* Focus view */
.mit-section{background:var(--surface);border:1px solid var(--border-light);border-top:3px solid var(--ow-orange);border-radius:10px;padding:0.85rem;margin-bottom:1rem}
.mit-label{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--ow-charcoal);margin-bottom:3px}
.mit-sub{font-size:11px;color:var(--text3);margin-bottom:8px}
.waiting-table{width:100%;font-size:11px;border-collapse:collapse}
.waiting-table th{text-align:left;padding:5px 7px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border-light);font-size:10px;text-transform:uppercase;letter-spacing:0.03em}
.waiting-table td{padding:6px 7px;color:var(--text);border-bottom:1px solid var(--border-light)}
.waiting-table tr:last-child td{border-bottom:none}

/* Archive */
.archive-header-block{background:var(--surface);border:1px solid var(--border-light);border-top:3px solid var(--ow-gray);border-radius:10px;padding:0.85rem;margin-bottom:7px}
.archive-title{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--ow-charcoal);margin-bottom:3px}
.archive-sub{font-size:11px;color:var(--text3)}
.archive-task{display:flex;align-items:center;gap:8px;padding:7px 0.85rem;border-top:1px solid var(--border-light);transition:background 0.1s;position:relative}
.archive-task:hover{background:var(--surface2)}.archive-task:hover .del-btn{opacity:1}
.archive-task-text{font-size:11px;color:var(--text3);text-decoration:line-through;flex:1}
.restore-btn{font-size:9px;padding:2px 7px;border-radius:4px;border:1px solid var(--ow-teal);background:transparent;color:var(--ow-teal);cursor:pointer;white-space:nowrap}.restore-btn:hover{background:var(--ow-teal-light)}
.empty-state{padding:1rem;text-align:center;color:var(--text3);font-size:11px}

/* Modal */
.modal-wrap{display:flex;align-items:center;justify-content:center;background:rgba(46,42,57,0.4);border-radius:10px;margin-top:8px;padding:1.5rem 0}
.modal{background:var(--surface);border-radius:10px;border:1px solid var(--border-light);padding:1.1rem;width:300px}
.modal-title{font-family:var(--font-head);font-size:14px;font-weight:600;margin-bottom:10px;color:var(--ow-charcoal)}
.modal label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px;margin-top:8px;text-transform:uppercase;letter-spacing:0.04em}
.modal input,.modal select{width:100%;font-family:var(--font-body);font-size:12px;padding:6px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--ow-teal)}
.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:12px}
.btn-cancel{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer}
.btn-save{font-size:11px;font-weight:500;padding:5px 12px;border-radius:7px;border:none;background:var(--ow-orange);color:#fff;cursor:pointer}

/* Saving indicator */
.saving-dot{width:7px;height:7px;border-radius:50%;background:var(--ow-teal);opacity:0;transition:opacity 0.2s;flex-shrink:0}
.saving-dot.visible{opacity:1;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="state-screen" id="loading-screen">
    <div class="spinner"></div>
    <div class="state-label">Loading OwnWatts HQ...</div>
  </div>
</div>

<script>
// ── Supabase config ──────────────────────────────────────────────
const SB_URL = 'https://uilfxxtoilvpnsrpzphe.supabase.co';
const SB_KEY = 'sb_publishable_94ftG4Eic81qo-YC1CGxuA_fQZUOJss';

async function sb(method, path, body) {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase ${method} ${path}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── State ────────────────────────────────────────────────────────
let projects = [];
let tasks = [];
let view = 'board';
let collapsed = {};
let pendingDelete = null;
let showingModal = false;

// ── Supabase operations ──────────────────────────────────────────
async function loadData() {
  const [p, t] = await Promise.all([
    sb('GET', 'projects?select=*&order=sort_order.asc'),
    sb('GET', 'tasks?select=*&order=id.asc')
  ]);
  projects = p;
  tasks = t;
}

async function addTask(text, projectId, ctx) {
  const rows = await sb('POST', 'tasks', { text, project_id: projectId, ctx, done: false, archived: false });
  tasks.push(rows[0]);
  render();
}

async function checkTask(id) {
  await sb('PATCH', `tasks?id=eq.${id}`, { done: true, archived: true });
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = true; t.archived = true; }
  render();
}

async function restoreTask(id) {
  await sb('PATCH', `tasks?id=eq.${id}`, { done: false, archived: false });
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = false; t.archived = false; }
  render();
}

async function deleteTask(id) {
  await sb('DELETE', `tasks?id=eq.${id}`);
  tasks = tasks.filter(t => t.id !== id);
  pendingDelete = null;
  render();
}

async function updateTaskText(id, text) {
  if (!text.trim()) return;
  await sb('PATCH', `tasks?id=eq.${id}`, { text: text.trim() });
  const t = tasks.find(t => t.id === id);
  if (t) t.text = text.trim();
}

async function updateTaskCtx(id, ctx) {
  await sb('PATCH', `tasks?id=eq.${id}`, { ctx });
  const t = tasks.find(t => t.id === id);
  if (t) { t.ctx = ctx; render(); }
}

// ── Helpers ──────────────────────────────────────────────────────
function projName(id) { return projects.find(p => p.id === id)?.name || id; }
function setView(v, el) {
  view = v;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function getFilter() { return document.getElementById('ctx-filter')?.value || 'all'; }
function activeTasks() { return tasks.filter(t => !t.archived); }
function archivedTasks() { return tasks.filter(t => t.archived); }
function filtered(pid) {
  const f = getFilter();
  return activeTasks().filter(t => t.project_id === pid && !t.done && (f === 'all' || t.ctx === f));
}
function ctxBadge(ctx) { return `<span class="task-context ctx-${ctx}">@${ctx}</span>`; }
function delIcon() { return '<svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>'; }

function confirmBox(id, label) {
  return `<div id="confirm-${id}" class="confirm-overlay" style="display:${pendingDelete === id ? 'flex' : 'none'}">
    <div class="confirm-box">
      <div class="confirm-msg">Delete "${label.length > 38 ? label.slice(0, 38) + '...' : label}"? Cannot be undone.</div>
      <div class="confirm-actions">
        <button class="confirm-cancel" onclick="cancelDelete()">Keep it</button>
        <button class="confirm-delete" onclick="doDelete(${id})">Delete</button>
      </div>
    </div>
  </div>`;
}

function requestDelete(id) { pendingDelete = id; render(); const el = document.getElementById('confirm-' + id); if (el) el.style.display = 'flex'; }
function cancelDelete() { pendingDelete = null; render(); }
function doDelete(id) { deleteTask(id); }

// ── Row renderers ────────────────────────────────────────────────
function taskRowBoard(t) {
  return `<div class="task-item" style="position:relative">
    ${confirmBox(t.id, t.text)}
    <div class="task-check" onclick="checkTask(${t.id})"></div>
    <span class="task-text">${t.text}</span>
    ${ctxBadge(t.ctx)}
    <button class="del-btn" onclick="requestDelete(${t.id})" title="Delete">${delIcon()}</button>
  </div>`;
}

function taskRowList(t) {
  const opts = ['deep','quick','research','waiting','decide','weekly']
    .map(c => `<option value="${c}"${t.ctx === c ? ' selected' : ''}>${c}</option>`).join('');
  return `<div class="list-task" style="position:relative">
    ${confirmBox(t.id, t.text)}
    <div class="task-check" onclick="checkTask(${t.id})" style="border-color:#888;flex-shrink:0"></div>
    <div class="list-task-text" contenteditable="true" onblur="updateTaskText(${t.id}, this.textContent)">${t.text}</div>
    ${ctxBadge(t.ctx)}
    <select class="ctx-select" onchange="updateTaskCtx(${t.id}, this.value)">${opts}</select>
    <button class="del-btn" onclick="requestDelete(${t.id})" title="Delete">${delIcon()}</button>
  </div>`;
}

function taskRowFocus(t) {
  return `<div class="list-task" style="position:relative">
    ${confirmBox(t.id, t.text)}
    <div class="task-check" onclick="checkTask(${t.id})" style="border-color:#888;flex-shrink:0"></div>
    <div class="list-task-text">${t.text}</div>
    <span style="font-size:10px;color:var(--text3);white-space:nowrap">${projName(t.project_id)}</span>
    <button class="del-btn" onclick="requestDelete(${t.id})" title="Delete">${delIcon()}</button>
  </div>`;
}

function taskRowArchive(t) {
  return `<div class="archive-task" style="position:relative">
    ${confirmBox(t.id, t.text)}
    <div class="task-check checked" onclick="restoreTask(${t.id})" style="cursor:pointer"></div>
    <div class="archive-task-text">${t.text}</div>
    ${ctxBadge(t.ctx)}
    <button class="restore-btn" onclick="restoreTask(${t.id})">Restore</button>
    <button class="del-btn" onclick="requestDelete(${t.id})" title="Delete">${delIcon()}</button>
  </div>`;
}

// ── Quick add ────────────────────────────────────────────────────
function quickAdd(pid, pfx) {
  const inp = document.getElementById((pfx || '') + pid);
  if (!inp || !inp.value.trim()) return;
  const f = getFilter();
  addTask(inp.value.trim(), pid, f === 'all' ? 'deep' : f);
  inp.value = '';
}

// ── Modal ────────────────────────────────────────────────────────
function showModal() { showingModal = true; render(); setTimeout(() => document.getElementById('m-text')?.focus(), 50); }
function hideModal() { showingModal = false; render(); }
function saveTask() {
  const text = (document.getElementById('m-text')?.value || '').trim();
  const pid = document.getElementById('m-project')?.value;
  const ctx = document.getElementById('m-ctx')?.value;
  if (!text) return;
  addTask(text, pid, ctx);
  hideModal();
}
function modalHTML() {
  const po = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  return `<div class="modal-wrap"><div class="modal">
    <div class="modal-title">New task</div>
    <label>Task</label>
    <input id="m-text" type="text" placeholder="Start with a verb: Email, Write, Fix..." onkeydown="if(event.key==='Enter')saveTask()"/>
    <label>Project</label><select id="m-project">${po}</select>
    <label>Context</label>
    <select id="m-ctx">
      <option value="deep">@deep - 60+ min focus</option>
      <option value="quick">@quick - under 15 min</option>
      <option value="research">@research - read and gather</option>
      <option value="waiting">@waiting - someone else</option>
      <option value="decide">@decide - blocked on decision</option>
      <option value="weekly">@weekly - review only</option>
    </select>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="hideModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Add task</button>
    </div>
  </div></div>`;
}

// ── Render stats ─────────────────────────────────────────────────
function renderStats() {
  const a = activeTasks(), ar = archivedTasks();
  const tot = a.length, done = ar.length;
  const deep = a.filter(t => t.ctx === 'deep').length;
  const quick = a.filter(t => t.ctx === 'quick').length;
  const wait = a.filter(t => t.ctx === 'waiting').length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Open tasks</div><div class="stat-val">${tot}</div></div>
    <div class="stat-card orange"><div class="stat-label">Completed</div><div class="stat-val">${done}</div><div class="stat-sub">in archive</div></div>
    <div class="stat-card"><div class="stat-label">@deep open</div><div class="stat-val">${deep}</div></div>
    <div class="stat-card coral"><div class="stat-label">@quick open</div><div class="stat-val">${quick}</div></div>
    <div class="stat-card butter"><div class="stat-label">@waiting</div><div class="stat-val">${wait}</div></div>`;
}

// ── Render board ─────────────────────────────────────────────────
function renderBoard() {
  const PREVIEW = 4;
  let h = '';
  projects.forEach(p => {
    const pt = filtered(p.id);
    const archP = archivedTasks().filter(t => t.project_id === p.id).length;
    const tot = activeTasks().filter(t => t.project_id === p.id).length + archP;
    const pct = tot ? Math.round(archP / tot * 100) : 0;
    const sa = collapsed['b-' + p.id];
    const sh = sa ? pt : pt.slice(0, PREVIEW);
    const more = pt.length - PREVIEW;
    h += `<div class="project-card ${p.type}">
      <div class="project-header">
        <div class="project-name">${p.name}</div>
        <span class="project-badge badge-${p.type}">${p.type}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-pct">${pct}%</span>
      </div>
      <div class="task-list">${sh.length ? sh.map(taskRowBoard).join('') : '<div class="empty-state">No tasks match filter</div>'}</div>
      ${more > 0 && !sa ? `<button class="show-more" onclick="collapsed['b-${p.id}']=true;render()">+ ${more} more</button>` : ''}
      ${sa && more > 0 ? `<button class="show-more" onclick="collapsed['b-${p.id}']=false;render()">Show fewer</button>` : ''}
      <div class="add-task-row">
        <input class="add-task-input" id="${p.id}" placeholder="Add task..." onkeydown="if(event.key==='Enter')quickAdd('${p.id}')"/>
        <button class="add-task-btn" onclick="quickAdd('${p.id}')">+</button>
      </div>
    </div>`;
  });
  let out = `<div class="board">${h}</div>`;
  if (showingModal) out += modalHTML();
  document.getElementById('main-view').innerHTML = out;
}

// ── Render list ──────────────────────────────────────────────────
function renderList() {
  const folders = [{k:'ACTIVE',c:'var(--ow-teal)'},{k:'DECIDE',c:'var(--ow-orange)'},{k:'SOMEDAY',c:'var(--ow-gray)'}];
  let h = '<div class="list-view">';
  folders.forEach(({k, c}) => {
    projects.filter(p => p.folder === k).forEach(p => {
      const pt = filtered(p.id);
      const ic = collapsed['l-' + p.id];
      h += `<div class="list-section ${ic ? 'collapsed' : ''}">
        <div class="list-section-header" onclick="collapsed['l-${p.id}']=!collapsed['l-${p.id}'];render()">
          <div style="width:9px;height:9px;border-radius:50%;background:${c};flex-shrink:0"></div>
          <div class="list-section-title">${p.name}</div>
          <span class="section-count">${pt.length} open</span>
          <span class="collapse-arrow">▾</span>
        </div>
        ${pt.length ? pt.map(taskRowList).join('') : '<div class="empty-state">No open tasks</div>'}
        <div class="add-task-row-list">
          <input class="add-task-input" id="l${p.id}" placeholder="Add task..." onkeydown="if(event.key==='Enter')quickAdd('${p.id}','l')"/>
          <button class="add-task-btn" onclick="quickAdd('${p.id}','l')">+</button>
        </div>
      </div>`;
    });
  });
  h += '</div>';
  if (showingModal) h += modalHTML();
  document.getElementById('main-view').innerHTML = h;
}

// ── Render focus ─────────────────────────────────────────────────
function renderFocus() {
  const f = getFilter();
  const open = activeTasks().filter(t => !t.done && (f === 'all' || t.ctx === f));
  const wait = activeTasks().filter(t => t.ctx === 'waiting' && !t.done);
  const grp = {};
  open.forEach(t => { if (!grp[t.ctx]) grp[t.ctx] = []; grp[t.ctx].push(t); });
  let h = `<div class="mit-section">
    <div class="mit-label">This week's 3 MITs</div>
    <div class="mit-sub">Most important tasks - update every Monday in Craft Command Center</div>
  </div><div class="list-view">`;
  ['deep','quick','research','waiting','decide','weekly'].forEach(ctx => {
    if (!grp[ctx]) return;
    const ic = collapsed['f-' + ctx];
    h += `<div class="list-section ${ic ? 'collapsed' : ''}">
      <div class="list-section-header" onclick="collapsed['f-${ctx}']=!collapsed['f-${ctx}'];render()">
        <div class="list-section-title">${ctxBadge(ctx)}</div>
        <span class="section-count">${grp[ctx].length}</span>
        <span class="collapse-arrow">▾</span>
      </div>
      ${grp[ctx].map(taskRowFocus).join('')}
    </div>`;
  });
  if (!open.length) h += '<div class="empty-state" style="padding:1.5rem">No open tasks match this filter</div>';
  if (wait.length) {
    h += `<div class="list-section" style="margin-top:4px">
      <div class="list-section-header"><div class="list-section-title" style="color:var(--text3)">@waiting</div><span class="section-count">${wait.length}</span></div>
      <table class="waiting-table" style="padding:0 0.85rem 7px">
        <tr><th style="padding-left:0.85rem">Item</th><th>Project</th></tr>
        ${wait.map(t => `<tr><td style="padding-left:0.85rem">${t.text}</td><td style="color:var(--text3)">${projName(t.project_id)}</td></tr>`).join('')}
      </table>
    </div>`;
  }
  h += '</div>';
  if (showingModal) h += modalHTML();
  document.getElementById('main-view').innerHTML = h;
}

// ── Render archive ───────────────────────────────────────────────
function renderArchive() {
  const ar = archivedTasks();
  const byP = {};
  ar.forEach(t => { if (!byP[t.project_id]) byP[t.project_id] = []; byP[t.project_id].push(t); });
  let h = `<div style="display:flex;flex-direction:column;gap:7px">
    <div class="archive-header-block">
      <div class="archive-title">Archive</div>
      <div class="archive-sub">${ar.length} completed task${ar.length !== 1 ? 's' : ''}. Uncheck or click Restore to move back.</div>
    </div>`;
  if (!ar.length) {
    h += '<div class="empty-state" style="padding:1.5rem;background:var(--surface);border-radius:10px;border:1px solid var(--border-light)">No completed tasks yet.</div>';
  } else {
    projects.forEach(p => {
      const pt = byP[p.id];
      if (!pt?.length) return;
      const ic = collapsed['a-' + p.id];
      h += `<div class="list-section ${ic ? 'collapsed' : ''}">
        <div class="list-section-header" onclick="collapsed['a-${p.id}']=!collapsed['a-${p.id}'];render()">
          <div style="width:9px;height:9px;border-radius:50%;background:var(--ow-gray);flex-shrink:0"></div>
          <div class="list-section-title">${p.name}</div>
          <span class="section-count">${pt.length} completed</span>
          <span class="collapse-arrow">▾</span>
        </div>
        ${pt.map(taskRowArchive).join('')}
      </div>`;
    });
  }
  h += '</div>';
  if (showingModal) h += modalHTML();
  document.getElementById('main-view').innerHTML = h;
}

// ── Main render ──────────────────────────────────────────────────
function render() {
  renderStats();
  if (view === 'board') renderBoard();
  else if (view === 'list') renderList();
  else if (view === 'focus') renderFocus();
  else renderArchive();
}

// ── Shell HTML ───────────────────────────────────────────────────
function buildShell() {
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="logo">
        <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
        OwnWatts HQ
        <span class="db-badge">⚡ live db</span>
      </div>
      <div class="controls">
        <select class="filter-select" id="ctx-filter" onchange="render()">
          <option value="all">All tasks</option>
          <option value="deep">@deep</option>
          <option value="quick">@quick</option>
          <option value="research">@research</option>
          <option value="waiting">@waiting</option>
          <option value="decide">@decide</option>
          <option value="weekly">@weekly</option>
        </select>
        <div class="view-tabs">
          <button class="view-tab active" onclick="setView('board',this)">Board</button>
          <button class="view-tab" onclick="setView('list',this)">List</button>
          <button class="view-tab" onclick="setView('focus',this)">Focus</button>
          <button class="view-tab" onclick="setView('archive',this)">Archive</button>
        </div>
        <button class="add-btn" onclick="showModal()">+ Add task</button>
      </div>
    </div>
    <div id="stats-row" class="stats-row"></div>
    <div id="main-view"></div>`;
}

// ── Boot ─────────────────────────────────────────────────────────
async function boot() {
  try {
    await loadData();
    buildShell();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="state-screen">
        <div class="error-box">
          <p><strong>Could not connect to database</strong><br>${e.message}</p>
          <button class="retry-btn" onclick="boot()">Retry</button>
        </div>
      </div>`;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (showingModal) hideModal();
    else if (pendingDelete != null) cancelDelete();
  }
});

boot();
</script>
</body>
</html>
